services:
  api:
    build:
      context: .
      dockerfile: backend_api/Dockerfile
    restart: ${MAYBEFLAT_HOME_RESTART_POLICY:-no}
    environment:
      PORT: 8002
      MAYBEFLAT_API_WORKERS: ${MAYBEFLAT_API_WORKERS:-1}
      MAYBEFLAT_TILE_CACHE_ROOT: /var/cache/maybeflat/tiles
      MAYBEFLAT_WARM_SCENE_DETAILS: ${MAYBEFLAT_WARM_SCENE_DETAILS:-desktop}
      MAYBEFLAT_WARM_EDGE_MODES: ${MAYBEFLAT_WARM_EDGE_MODES:-coastline}
      MAYBEFLAT_WARM_MAX_ZOOM: ${MAYBEFLAT_WARM_MAX_ZOOM:-1}
      MAYBEFLAT_ALLOWED_ORIGINS: ${MAYBEFLAT_ALLOWED_ORIGINS:-https://maybeflat.com,https://www.maybeflat.com}
      MAYBEFLAT_ALLOWED_ORIGIN_REGEX: ${MAYBEFLAT_ALLOWED_ORIGIN_REGEX:-^https:\/\/.*\.pages\.dev$}
    expose:
      - "8002"
    volumes:
      - maybeflat_tile_cache:/var/cache/maybeflat/tiles

  caddy:
    image: caddy:2.10-alpine
    restart: ${MAYBEFLAT_HOME_RESTART_POLICY:-no}
    depends_on:
      - api
    volumes:
      - ./Caddyfile.home:/etc/caddy/Caddyfile:ro
      - ./app_flutter/build/web:/srv:ro
      - maybeflat_tile_cache:/var/cache/maybeflat/tiles:ro
    ports:
      - "127.0.0.1:8080:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: ${MAYBEFLAT_HOME_RESTART_POLICY:-no}
    depends_on:
      - caddy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  maybeflat_tile_cache:
