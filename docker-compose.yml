services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAYBEFLAT_POSTGRES_DB:-maybeflat}
      POSTGRES_USER: ${MAYBEFLAT_POSTGRES_USER:-maybeflat}
      POSTGRES_PASSWORD: ${MAYBEFLAT_POSTGRES_PASSWORD:-change-me}
    expose:
      - "5432"
    volumes:
      - maybeflat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${MAYBEFLAT_POSTGRES_USER:-maybeflat} -d ${MAYBEFLAT_POSTGRES_DB:-maybeflat}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: backend_api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8002
      MAYBEFLAT_API_WORKERS: ${MAYBEFLAT_API_WORKERS:-4}
      MAYBEFLAT_TILE_CACHE_ROOT: /var/cache/maybeflat/tiles
      MAYBEFLAT_WARM_SCENE_DETAILS: ${MAYBEFLAT_WARM_SCENE_DETAILS:-desktop,full}
      MAYBEFLAT_WARM_EDGE_MODES: ${MAYBEFLAT_WARM_EDGE_MODES:-coastline,country,both}
      MAYBEFLAT_WARM_MAX_ZOOM: ${MAYBEFLAT_WARM_MAX_ZOOM:-3}
      MAYBEFLAT_ALLOWED_ORIGINS: ${MAYBEFLAT_ALLOWED_ORIGINS:-https://maybeflat.com,https://www.maybeflat.com}
      MAYBEFLAT_ALLOWED_ORIGIN_REGEX: ${MAYBEFLAT_ALLOWED_ORIGIN_REGEX:-^https:\/\/.*\.pages\.dev$}
      MAYBEFLAT_DATABASE_URL: ${MAYBEFLAT_DATABASE_URL:-postgresql://maybeflat:${MAYBEFLAT_POSTGRES_PASSWORD:-change-me}@postgres:5432/maybeflat}
      MAYBEFLAT_ADMIN_TOKEN: ${MAYBEFLAT_ADMIN_TOKEN:-}
    expose:
      - "8002"
    volumes:
      - maybeflat_tile_cache:/var/cache/maybeflat/tiles

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app_flutter/build/web:/srv:ro
      - maybeflat_tile_cache:/var/cache/maybeflat/tiles:ro
      - ./var/log/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  maybeflat_tile_cache:
  maybeflat_postgres_data:
